name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:e2e
      - name: Build shared package
        run: npm run build --workspace=@codelens-v5/shared
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
      - name: TypeScript check (shared)
        run: npx tsc --noEmit -p packages/shared/tsconfig.json
      - name: TypeScript check (server)
        run: npx tsc --noEmit -p packages/server/tsconfig.json
      - name: TypeScript check (client)
        run: npx tsc --noEmit -p packages/client/tsconfig.json
      - name: TypeScript check (e2e)
        run: npx tsc --noEmit -p e2e/tsconfig.json

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build --workspace=@codelens-v5/shared
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
      - name: Run server tests with coverage
        run: npx vitest run --coverage --reporter=verbose
        working-directory: packages/server
      - name: Run client tests with coverage
        run: npx vitest run --coverage --reporter=verbose
        working-directory: packages/client

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ secrets.CI_DB_USER || 'codelens' }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-test-only' }}
          POSTGRES_DB: codelens
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U codelens"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://${{ secrets.CI_DB_USER || 'codelens' }}:${{ secrets.CI_DB_PASSWORD || 'ci-test-only' }}@localhost:5432/codelens
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-test-secret-key-at-least-16-chars' }}
      ADMIN_EMAIL: admin@codelens.dev
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci-test-password-1234' }}
      NODE_ENV: test
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build --workspace=@codelens-v5/shared
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/server/prisma/schema.prisma
      - name: Seed database
        run: npm run db:seed --workspace=@codelens-v5/server
      - name: Seed canonical ExamInstance
        run: npm run db:seed:canonical --workspace=@codelens-v5/server
      - name: Seed admin user
        run: npm run db:seed:admin --workspace=@codelens-v5/server
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests (smoke + golden-path · single playwright invocation)
        run: npx playwright test --config=e2e/playwright.golden-path.config.ts
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  prompt-regression:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      contains(github.event.head_commit.modified, 'packages/server/prompts/') ||
      contains(github.event.head_commit.modified, 'packages/server/promptfooconfig.yaml') ||
      github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install promptfoo
        run: npx promptfoo@latest --version
      - name: Run prompt regression tests
        run: npx promptfoo eval -c packages/server/promptfooconfig.yaml --no-cache
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Upload promptfoo results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-results
          path: packages/server/promptfoo-output/
          if-no-files-found: ignore
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/server/prisma/schema.prisma
      - name: Build shared
        run: npm run build -w packages/shared
      - name: Build server
        run: npm run build -w packages/server
      - name: Build client
        run: npm run build -w packages/client

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: |
          docker build -t codelens-server:${{ github.sha }} -f packages/server/Dockerfile .
          docker build -t codelens-server:latest -f packages/server/Dockerfile .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: codelens-server:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      # Push to registry when configured:
      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - name: Push images
      #   run: |
      #     docker tag codelens-server:latest ghcr.io/${{ github.repository }}/server:latest
      #     docker tag codelens-server:${{ github.sha }} ghcr.io/${{ github.repository }}/server:${{ github.sha }}
      #     docker push ghcr.io/${{ github.repository }}/server:latest
      #     docker push ghcr.io/${{ github.repository }}/server:${{ github.sha }}
