version: '3.8'

# Production Docker Compose — CodeLens A+
# Usage:
#   1. Copy .env.example to .env.production and fill in real values
#   2. Place SSL certs in ./nginx/certs/ (fullchain.pem + privkey.pem)
#   3. docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: codelens-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codelens}
      POSTGRES_USER: ${POSTGRES_USER:-codelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-codelens}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: codelens-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: codelens-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-codelens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codelens}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      NODE_ENV: production
      PORT: 4000
    env_file:
      - .env.production
    init: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: codelens-nginx
    restart: always
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
      - external

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
